apiVersion: v1
kind: Service
metadata:
  labels:
    app: {{ .Values.shib_name }}-svc
  name: {{ .Values.shib_name }}-svc
  namespace: {{ .Values.namespace }}
spec:
  ports:
  - name: "{{ .Values.shib_name }}"
    port: 80
    protocol: TCP
    targetPort: 8080
  selector:
    app: {{ .Values.shib_name }}
  type: ClusterIP
status:
  loadBalancer: {}

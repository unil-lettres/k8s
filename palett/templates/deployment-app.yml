apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app_name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.app_replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app_name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app_name }}
    spec:
      securityContext:
        runAsUser: 5001
        fsGroup: 5001
      initContainers:
      - name: fix-permissions
        image: busybox:latest
        command: [
          "sh",
          "-c",
          "chown -R etherpad:root /opt/etherpad-lite/src/plugin_packages /opt/etherpad-lite/var"
        ]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: {{ .Values.app_volume_name }}
          mountPath: /opt/etherpad-lite/src/plugin_packages
          subPath: plugins-data
        - name: {{ .Values.app_volume_name }}
          mountPath: /opt/etherpad-lite/var
          subPath: var-data
      - name: wait-for
        image: ghcr.io/patrickdappollonio/wait-for:latest
        command:
          - /wait-for
        args:
          - --host="{{ .Values.db_name }}-svc:3306"
          - --verbose
      containers:
      - name: {{ .Values.app_name }}
        image: "unillett/etherpad:{{ .Values.app_image_tag }}"
        envFrom:
          - configMapRef:
              name: {{ .Values.app_name }}-cm
        ports:
        - containerPort: 9001
          name: {{ .Values.app_name }}
          protocol: TCP
        volumeMounts:
        - name: {{ .Values.app_volume_name }}
          mountPath: /opt/etherpad-lite/src/plugin_packages
          subPath: plugins-data
        - name: {{ .Values.app_volume_name }}
          mountPath: /opt/etherpad-lite/var
          subPath: var-data
        lifecycle:
          postStart:
            exec:
              command: ["/bin/sh", "-c", "/opt/etherpad-lite/k8s-poststart.sh"]
        resources:
          requests:
            memory: "{{ .Values.app_memory_request }}"
            cpu: "{{ .Values.app_cpu_request }}"
          limits:
            memory: "{{ .Values.app_memory_limit }}"
            cpu: "{{ .Values.app_cpu_limit }}"
      volumes:
      - name: {{ .Values.app_volume_name }}
        persistentVolumeClaim:
          claimName: {{ .Values.app_name }}-pvc
